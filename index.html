<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학급 과제 체크리스트</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #f9f9f9;
        }

        /* 상단 헤더 영역 */
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
        }

        .star { font-size: 40px; margin-right: 15px; }

        .task-input {
            flex-grow: 1;
            padding: 15px;
            border: none;
            border-radius: 20px;
            background-color: #ffdada; /* 이미지와 유사한 분홍색 */
            font-size: 1.2rem;
            text-align: center;
            outline: none;
        }

        /* 그리드 테이블 레이아웃 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5열 고정 */
            gap: 1px;
            background-color: #333; /* 테두리 선 역할 */
            border: 2px solid #333;
            width: 100%;
            max-width: 500px;
        }

        .student-cell {
            background-color: white;
            aspect-ratio: 1 / 1.2; /* 세로가 약간 긴 비율 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: none;
            padding: 5px;
            transition: background-color 0.2s;
        }

        /* 짝수 행 또는 특정 칸 배경색 설정 (이미지 느낌 재현) */
        .student-cell:nth-child(even) { background-color: #efefef; }

        .num { font-size: 0.9rem; margin-bottom: 5px; color: #555; }
        .name { font-size: 1.1rem; font-weight: bold; }

        /* 체크 완료 상태 */
        .checked { background-color: #b0b0b0 !important; }
        .checked .name { display: none; } /* 이름 사라짐 */
        .checked::after {
            content: '○';
            font-size: 2.5rem;
            color: #ff0000;
        }

        .reset-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="star">⭐</div>
        <input type="text" class="task-input" placeholder="여기에 과제 내용을 적으세요">
    </div>

    <div class="grid-container" id="grid">
        </div>

    <button class="reset-btn" onclick="resetChecklist()">모두 초기화</button>

    <script>
        // 여기에 학생 이름을 번호 순서대로 넣으세요.
        const students = [
            "강태영", "김재아", "김지아", "김지유", "김지한",
            "김채령", "남현우", "문유찬", "박지호", "서예림",
            "신현진", "여승우", "이루안", "이서아", "이예은",
            "이정우", "이채연", "임수현", "정아율", "제갈선율",
            "최서준", "최아윤", "한수아", "", "" // 24, 25번 빈칸 예시
        ];

        const grid = document.getElementById('grid');

        // 명렬표 생성 함수
        function createGrid() {
            students.forEach((name, index) => {
                const cell = document.createElement('div');
                cell.className = 'student-cell';
                
                // 번호 레이블
                const numSpan = document.createElement('span');
                numSpan.className = 'num';
                numSpan.innerText = index + 1;
                
                // 이름 레이블
                const nameSpan = document.createElement('span');
                nameSpan.className = 'name';
                nameSpan.innerText = name;

                cell.appendChild(numSpan);
                cell.appendChild(nameSpan);

                // 클릭 이벤트: 체크 표시 토글
                cell.onclick = function() {
                    if (name !== "") { // 빈 칸이 아닐 때만 작동
                        this.classList.toggle('checked');
                    }
                };

                grid.appendChild(cell);
            });
        }

        // 초기화 버튼
        function resetChecklist() {
            const cells = document.querySelectorAll('.student-cell');
            cells.forEach(cell => cell.classList.remove('checked'));
        }

        // 실행
        createGrid();
    </script>
</body>
</html>
